name: Client Build, Publish, and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example: 1.1.1)"
        required: true
        type: string
      release_name:
        description: "Release name (defaults to tag if empty)"
        required: false
        default: ""
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: false
        type: boolean

jobs:
  build:
    name: Build package distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install Poetry
      run: |
        make poetry
    - name: Install dependencies
      run: |
        make install-build
    - name: Build package
      run: |
        make build
    - name: Upload dist artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python-dist
        path: dist/*
        if-no-files-found: error

  pypi-publish:
    name: Upload release to public PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/django-livefield
    permissions:
      id-token: write
    steps:
    - name: Download dist artifacts
      uses: actions/download-artifact@v4
      with:
        name: python-dist
        path: dist
    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

  create-github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
    - pypi-publish
    permissions:
      contents: write
    steps:
    - name: Download dist artifacts
      uses: actions/download-artifact@v4
      with:
        name: python-dist
        path: dist
    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.tag }}
        name: ${{ inputs.release_name || inputs.tag }}
        target_commitish: ${{ github.sha }}
        prerelease: ${{ inputs.prerelease }}
        generate_release_notes: true
        files: dist/*
